<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#8704;ISION_E &mdash; Conference Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#7c6af7;--accent2:#a78bfa;--text:#e8e8f0;--muted:#6b6b80;--bot:#1e1e2e;--user:#2d2257;--ok:#4ade80;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(124,106,247,.08) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 80% 80%,rgba(167,139,250,.06) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:10;padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);flex-wrap:nowrap;}
.logo{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;}
.logo-sub{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}
.reset-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;white-space:nowrap;}
.reset-btn:hover{border-color:var(--accent);color:var(--accent2);}

/* KEYWORDS BUTTON */
.kw-btn{padding:5px 11px;border-radius:16px;border:1px solid var(--accent);background:rgba(124,106,247,.1);color:var(--accent2);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.kw-btn:hover,.kw-btn.open{background:rgba(124,106,247,.2);}
.kw-btn .arrow{transition:transform .2s;font-size:8px;}
.kw-btn.open .arrow{transform:rotate(180deg);}

/* KEYWORDS MODAL */
.kw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;backdrop-filter:blur(3px);}
.kw-overlay.open{display:block;}
.kw-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(580px,92vw);max-height:min(70vh,500px);overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;z-index:301;box-shadow:0 20px 60px rgba(0,0,0,.8);}
.kw-modal.open{display:block;}
.kw-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.kw-modal-title{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2);}
.kw-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0 4px;}
.kw-section{margin-bottom:14px;}
.kw-section:last-child{margin-bottom:0;}
.kw-section-title{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.kw-tags{display:flex;flex-wrap:wrap;gap:5px;}
.kw-tag{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:11px;cursor:pointer;transition:all .15s;}
.kw-tag:hover{border-color:var(--accent);color:var(--accent2);background:rgba(124,106,247,.08);}
.kw-tag.t1{border-color:rgba(124,106,247,.35);color:rgba(167,139,250,.8);}
.kw-tag.t2{border-color:rgba(74,222,128,.25);color:rgba(74,222,128,.8);}
.kw-tag.t3{border-color:rgba(251,191,36,.25);color:rgba(251,191,36,.8);}
.kw-tag.common{border-color:rgba(148,163,184,.2);}

/* TRACK BAR */
.track-bar{position:relative;z-index:10;padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;background:rgba(10,10,15,.7);overflow-x:auto;}
.track-bar::-webkit-scrollbar{height:0;}
.tbtn{padding:5px 11px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--accent2);}
.tbtn.active{background:rgba(124,106,247,.15);border-color:var(--accent);color:var(--accent2);}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);}
.msg{display:flex;gap:10px;max-width:88%;animation:fi .25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.bot{align-self:flex-start;}
.av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px;}
.av.b{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.av.u{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.bub{padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.7;word-break:break-word;}
.bot .bub{background:var(--bot);border:1px solid var(--border);border-top-left-radius:2px;}
.user .bub{background:var(--user);border:1px solid rgba(124,106,247,.3);border-top-right-radius:2px;}
.bub strong{color:var(--accent2);}
.bub em{color:var(--muted);font-style:italic;}
.badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:9px;font-family:'Space Mono',monospace;background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.3);color:var(--accent2);margin-bottom:5px;margin-right:4px;}
.inline-btn{background:none;border:1px solid var(--border);color:var(--accent2);padding:3px 10px;border-radius:12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin:2px 0;transition:all .2s;display:inline-block;}
.inline-btn:hover{background:rgba(124,106,247,.1);border-color:var(--accent);}
.typing{display:flex;gap:3px;padding:12px 14px;background:var(--bot);border:1px solid var(--border);border-radius:10px;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:ty 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes ty{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* INPUT */
.input-area{position:relative;z-index:10;padding:12px 16px;border-top:1px solid var(--border);background:rgba(10,10,15,.9);display:flex;gap:10px;align-items:flex-end;}
#inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;outline:none;min-height:40px;max-height:100px;transition:border-color .2s;line-height:1.5;}
#inp:focus{border-color:var(--accent);}
#inp::placeholder{color:var(--muted);}
#send{width:40px;height:40px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
#send:hover{transform:scale(1.05);}
#send:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* WELCOME */
.welcome{text-align:center;padding:32px 20px;}
.wtitle{font-family:'Space Mono',monospace;font-size:22px;color:var(--accent2);margin-bottom:8px;}
.wsub{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:22px;}
.quick-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.qbtn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.qbtn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(124,106,247,.08);}
</style>
</head>
<body>

<!-- KEYWORDS OVERLAY + MODAL -->
<div class="kw-overlay" id="kwOverlay" onclick="toggleKeywords()"></div>
<div class="kw-modal" id="kwModal">
  <div class="kw-modal-header">
    <span class="kw-modal-title"># Keywords — Browse by topic</span>
    <button class="kw-close" onclick="toggleKeywords()">&times;</button>
  </div>
  <div class="kw-section">
    <div class="kw-section-title">&#9656; Common — All Tracks</div>
    <div class="kw-tags" id="kwCommon"></div>
  </div>
  <div class="kw-section">
    <div class="kw-section-title" style="color:rgba(167,139,250,.8)">&#9656; Track 1 — Representation &amp; Design</div>
    <div class="kw-tags" id="kwT1"></div>
  </div>
  <div class="kw-section">
    <div class="kw-section-title" style="color:rgba(74,222,128,.7)">&#9656; Track 2 — Heritage Conservation</div>
    <div class="kw-tags" id="kwT2"></div>
  </div>
  <div class="kw-section">
    <div class="kw-section-title" style="color:rgba(251,191,36,.7)">&#9656; Track 3 — Education &amp; Learning</div>
    <div class="kw-tags" id="kwT3"></div>
  </div>
</div>

<header>
  <div class="logo">&#8704;ISION_E</div>
  <div class="logo-sub">Conference Bot</div>
  <button class="kw-btn" id="kwBtn" onclick="toggleKeywords()">
    &#35; Keywords <span class="arrow">&#9660;</span>
  </button>
  <div class="header-right">
    <button class="reset-btn" onclick="resetChat()">&#8635; Reset</button>
    <div class="dot"></div>
  </div>
</header>

<div class="track-bar">
  <button class="tbtn active" onclick="selTrack('all',this)">All Tracks</button>
  <button class="tbtn" onclick="selTrack('1',this)">T1 &middot; Representation &amp; Design</button>
  <button class="tbtn" onclick="selTrack('2',this)">T2 &middot; Heritage Conservation</button>
  <button class="tbtn" onclick="selTrack('3',this)">T3 &middot; Education &amp; Learning</button>
</div>

<div id="msgs">
  <div class="welcome" id="welcome">
    <div class="wtitle">&#8704;ISION_E</div>
    <div class="wsub">Welcome to the Conference Bot<br>Ask anything about contributions, programme or logistics</div>
    <div class="quick-btns">
      <button class="qbtn" onclick="quickAsk('What are the papers in Track 1?')">Track 1 papers</button>
      <button class="qbtn" onclick="quickAsk('What are the papers in Track 2?')">Track 2 papers</button>
      <button class="qbtn" onclick="quickAsk('What are the papers in Track 3?')">Track 3 papers</button>
      <button class="qbtn" onclick="quickAsk('What is the cronoprogram and timetable for the conference day?')">Schedule</button>
      <button class="qbtn" onclick="quickAsk('What is the venue and location of the VISION_E conference?')">Venue</button>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="inp" placeholder="Ask about the conference..." rows="1"></textarea>
  <button id="send">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script>
const TRACKS = {
  '1': 'AI for Representation and Design',
  '2': 'AI for Heritage Conservation and Enhancement',
  '3': 'AI for Education and Learning'
};

const KEYWORDS = {
  common: [
    'LLM','RAG','NLP','Generative AI','Diffusion Models','GANs','NeRF',
    'Neural Networks','Multimodal AI','Data-driven','Fine-tuning',
    'AI Ethics','AI Fairness and Bias Mitigation','AI Literacy',
    'Human-AI Collaboration','Human-AI Co-creation','Extended Intelligence',
    'Hybrid Cognitive Ecosystems','Interdisciplinary Research',
    'Image Generation','Video Generation','3D Models Generation',
    'Speculative Design','World Models'
  ],
  t1: [
    'BIM','Parametric Design','Generative Design','Computational Creativity',
    'Computational Aesthetics','Morphological Analysis','Form-finding',
    'Architectural Design','Urban Design','AI in Urban Design',
    'Shared Authorship','Algorithmic Prototyping','Virtual Prototyping',
    'Style Transfer','AI-powered BIM','Architectural Representation',
    'AI for Sustainable Design','Design Space Exploration',
    'Posthuman Cartography','Artistic Intention','Generative UI'
  ],
  t2: [
    'Digital Heritage','Digital Survey','AI-enhanced Photogrammetry',
    'Geometric Analysis','Scan-to-BIM','Scan-to-HBIM','HBIM',
    'Historical Document Analysis','Digital Reconstruction','Digital Restoration',
    'Dynamic Storytelling','Digital Archives','Semantic Enrichment',
    'Knowledge Representation','Linked Open Data','Predictive Conservation',
    'AI-assisted Heritage Conservation','Interactive Storytelling',
    'Immersive Experiences','Cultural Heritage','Archive Valorisation'
  ],
  t3: [
    'AI in Architecture and Design Education','Architectural Pedagogy',
    'Design Education','AI-mediated Learning','Adaptive Learning',
    'Immersive Learning','Gamification','Active Engagement',
    'Collaborative Virtual Environments','Learning Analytics',
    'Intelligent Tutoring','Student Modeling','Academic Integrity',
    'AI Literacy','Speculative Design','Virtual Reality co-design',
    'Intangible Cultural Heritage','Serious Games'
  ]
};

let track = 'all', loading = false;
const sid = 's' + Math.random().toString(36).slice(2, 9);
let userLang = 'en'; // updated when user sends a message

// Build keyword tags
function buildKeywords() {
  const fill = (id, kws, cls) => {
    document.getElementById(id).innerHTML = kws.map(k =>
      `<button class="kw-tag ${cls}" onclick="searchKeyword('${k}')">${k}</button>`
    ).join('');
  };
  fill('kwCommon', KEYWORDS.common, 'common');
  fill('kwT1', KEYWORDS.t1, 't1');
  fill('kwT2', KEYWORDS.t2, 't2');
  fill('kwT3', KEYWORDS.t3, 't3');
}
buildKeywords();

function toggleKeywords() {
  const btn = document.getElementById('kwBtn');
  const modal = document.getElementById('kwModal');
  const overlay = document.getElementById('kwOverlay');
  const isOpen = modal.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  modal.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

function searchKeyword(kw) {
  toggleKeywords();
  quickAsk('What are the contributions related to ' + kw + '?');
}

const inp = document.getElementById('inp');
const sendBtn = document.getElementById('send');

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
sendBtn.addEventListener('click', sendMessage);


const TRACK_DESCRIPTIONS = {
  '1': {
    en: "Track 1 explores AI as a creative partner that amplifies human imagination. Topics include AI systems for generating new ideas, forms and visual languages, methodologies for creating and hybridizing images and 3D models, co-design systems, predictive applications, and critical reflections on the aesthetics emerging from human-machine collaboration.",
    it: "La Track 1 esplora l’AI come partner creativo. I temi includono sistemi per la generazione di nuove idee, forme e linguaggi visivi, metodologie per la creazione e l’ibridazione di immagini e modelli 3D, sistemi di co-design assistito, applicazioni predittive e riflessioni critiche sulle estetiche emergenti dalla collaborazione uomo-macchina."
  },
  '2': {
    en: "Track 2 investigates AI potential in conserving, documenting and valorising cultural heritage, with attention to museums, archives and libraries. Key themes include collaborative interpretation between human and artificial intelligence, semantic enrichment of digital models, interactive documentation, advanced diagnostics for preventive conservation, and new modes of access to physical and digital collections.",
    it: "La Track 2 indaga le potenzialita dell’AI nella conservazione, documentazione e valorizzazione del patrimonio culturale. I temi principali includono l’interpretazione collaborativa tra intelligenza umana e artificiale, l’arricchimento semantico di modelli digitali, la documentazione interattiva, le analisi diagnostiche avanzate per la conservazione preventiva e nuove modalita di accesso alle collezioni."
  },
  '3': {
    en: "Track 3 explores AI impact on educational paradigms and teaching-learning processes. Key themes include personalised learning models, NLP for fluid student interactions, gamification, immersive learning environments, and rigorous approaches to learning validation in hybrid contexts that combine technology and pedagogy.",
    it: "La Track 3 esplora l’impatto dell’AI sui paradigmi educativi. I temi principali includono modelli di didattica personalizzata e interattiva, sistemi NLP per interazioni piu fluide, gamification, ambienti di apprendimento immersivo e approcci per la validazione dell’apprendimento in contesti ibridi che intrecciano tecnologia e pedagogia."
  }
};

function detectLang() {
  // Default to English — Italian only if user has written in Italian
  return userLang || 'en';
}

function selTrack(t, btn) {
  track = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (t !== 'all') {
    const html = [
      '<span class="badge">TRACK ' + t + '</span> <strong>' + TRACKS[t] + '</strong><br><br>',
      'You are now browsing Track ' + t + '. Try:<br>',
      '<button class="inline-btn" id="list-btn-' + t + '">List all papers</button>',
      ' &nbsp; ',
      '<button class="inline-btn" id="about-btn-' + t + '">About this track</button>'
    ].join('');
    addMsg('bot', html);
    setTimeout(function() {
      var lb = document.getElementById('list-btn-' + t);
      var ab = document.getElementById('about-btn-' + t);
      if (lb) lb.onclick = function() { quickAsk('List all papers and authors in Track ' + t); };
      if (ab) ab.onclick = function() { showTrackDescription(t); };
    }, 50);
  }
}

function quickAsk(q) {
  document.getElementById('welcome')?.remove();
  inp.value = q;
  sendMessage();
}

function formatText(text) {
  return text
    .replace(/^\* (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMsg(role, html) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'bot' ? 'b' : 'u');
  av.textContent = role === 'bot' ? 'AI' : 'YOU';
  const b = document.createElement('div');
  b.className = 'bub';
  b.innerHTML = html;
  d.appendChild(av); d.appendChild(b);
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  const av = document.createElement('div');
  av.className = 'av b'; av.textContent = 'AI';
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  d.appendChild(av); d.appendChild(t);
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() { document.getElementById('typing')?.remove(); }


function showTrackDescription(t) {
  const lang = detectLang();
  const desc = TRACK_DESCRIPTIONS[t][lang];
  const itNames = [
    'AI per la Rappresentazione e la Progettazione',
    'AI per la Conservazione e la Valorizzazione del Patrimonio',
    'AI per la Didattica e l’Educazione'
  ];
  const trackName = lang === 'it' ? itNames[parseInt(t)-1] : TRACKS[t];
  addMsg('bot', '<span class="badge">TRACK ' + t + '</span><br><strong>' + trackName + '</strong><br><br>' + desc);
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function linkPapers(answer, papers) {
  if (!papers || papers.length === 0) return answer;

  papers.forEach(p => {
    const icon = ` <a href="${p.url}" target="_blank" style="text-decoration:none;">🔗</a>`;

    const regex = new RegExp(escapeRegex(p.title), "g");

    answer = answer.replace(
      regex,
      `${p.title}${icon}`
    );
  });

  return answer;
}
function renderWithCitations(answer, citations) {
  if (!citations || citations.length === 0) return answer;

  // sort backwards so offsets don't break
  citations.sort((a, b) => b.start - a.start);

  let result = answer;

  citations.forEach(c => {
    const before = result.slice(0, c.end);
    const target = result.slice(c.start, c.end);
    const after = result.slice(c.end);

    result =
      before +
      `<a href="${c.url}" target="_blank" style="text-decoration:none">
        ${target} 🔗
      </a>` +
      after;
  });

  return result;
}

async function sendMessage() {
  const txt = inp.value.trim();
  if (!txt || loading) return;
  loading = true;
  sendBtn.disabled = true;
  document.getElementById('welcome')?.remove();
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', txt);
  showTyping();
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: txt, session_id: sid, track: track === 'all' ? null : track })
    });
    const data = await r.json();
    hideTyping();
    //addMsg('bot', formatText(data.answer || 'No response.')); //29.05.2026 VB

    /*let answer = formatText(data.answer || 'No response.');
    answer = linkPapers(answer, data.papers || []);
    addMsg('bot', answer);*/
    
    const html = renderWithCitations(
      formatText(data.answer || 'No response.'),
      data.citations
    );
    
    addMsg('bot', html);
    
    
    if (data.track && data.track !== track) track = data.track;
    // Update language based on what the server detected
    if (data.language) userLang = data.language;
  } catch(e) {
    hideTyping();
    addMsg('bot', 'Connection error. Please try again.');
  }
  loading = false;
  sendBtn.disabled = false;
  inp.focus();
}

async function resetChat() {
  await fetch('/chat/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sid })
  });
  document.getElementById('msgs').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="wtitle">&#8704;ISION_E</div>
      <div class="wsub">Welcome to the Conference Bot<br>Ask anything about contributions, programme or logistics</div>
      <div class="quick-btns">
        <button class="qbtn" onclick="quickAsk('What are the papers in Track 1?')">Track 1 papers</button>
        <button class="qbtn" onclick="quickAsk('What are the papers in Track 2?')">Track 2 papers</button>
        <button class="qbtn" onclick="quickAsk('What are the papers in Track 3?')">Track 3 papers</button>
        <button class="qbtn" onclick="quickAsk('What is the cronoprogram and timetable for the conference day?')">Schedule</button>
        <button class="qbtn" onclick="quickAsk('What is the venue and location of the VISION_E conference?')">Venue</button>
      </div>
    </div>`;
  track = 'all';
  document.querySelectorAll('.tbtn').forEach((b, i) => b.classList.toggle('active', i === 0));
}
</script>
